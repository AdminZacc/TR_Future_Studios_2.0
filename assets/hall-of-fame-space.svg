<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hall of Fame Atrium Concept</title>
  <desc id="desc">A concept illustration of a music innovation hall of fame space with timeline walls, awards display, listening pods, and central interactive monument.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1329"/>
      <stop offset="60%" stop-color="#241a47"/>
      <stop offset="100%" stop-color="#3f1f5f"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e5ab6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2f2156" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8de8b"/>
      <stop offset="100%" stop-color="#b68728"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <ellipse cx="800" cy="760" rx="620" ry="120" fill="#d7b0ff" opacity="0.22" filter="url(#soft)"/>
  <path d="M150 670 L800 430 L1450 670 L1450 900 L150 900 Z" fill="url(#floor)"/>

  <path d="M180 230 L180 670 L800 430 L800 130 Z" fill="#4d2d7f" opacity="0.9"/>
  <path d="M800 130 L800 430 L1420 670 L1420 230 Z" fill="#5a348f" opacity="0.92"/>

  <rect x="250" y="260" width="390" height="110" rx="14" fill="#2d1a4f" stroke="#b894ff" stroke-width="3"/>
  <text x="275" y="305" fill="#e9d9ff" font-size="38" font-family="Arial, sans-serif" font-weight="700">HALL OF FAME ATRIUM</text>
  <text x="275" y="340" fill="#c8b0ef" font-size="24" font-family="Arial, sans-serif">Teddy Riley Legacy + Future Innovators</text>

  <g opacity="0.95">
    <rect x="260" y="420" width="170" height="210" rx="10" fill="#1c1238" stroke="#8f74d1"/>
    <rect x="450" y="420" width="170" height="210" rx="10" fill="#1c1238" stroke="#8f74d1"/>
    <text x="285" y="460" fill="#e1cdfc" font-size="20" font-family="Arial, sans-serif">1980s</text>
    <text x="475" y="460" fill="#e1cdfc" font-size="20" font-family="Arial, sans-serif">1990s</text>
    <circle cx="345" cy="525" r="22" fill="url(#gold)"/>
    <circle cx="535" cy="525" r="22" fill="url(#gold)"/>
    <rect x="311" y="560" width="68" height="10" fill="#9f87d4"/>
    <rect x="501" y="560" width="68" height="10" fill="#9f87d4"/>
    <text x="290" y="600" fill="#cab7ef" font-size="15" font-family="Arial, sans-serif">New Jack Swing</text>
    <text x="492" y="600" fill="#cab7ef" font-size="15" font-family="Arial, sans-serif">Global Influence</text>
  </g>

  <g opacity="0.95">
    <rect x="980" y="420" width="170" height="210" rx="10" fill="#1c1238" stroke="#8f74d1"/>
    <rect x="1170" y="420" width="170" height="210" rx="10" fill="#1c1238" stroke="#8f74d1"/>
    <text x="1000" y="460" fill="#e1cdfc" font-size="20" font-family="Arial, sans-serif">2000s</text>
    <text x="1188" y="460" fill="#e1cdfc" font-size="20" font-family="Arial, sans-serif">Future</text>
    <circle cx="1065" cy="525" r="22" fill="url(#gold)"/>
    <circle cx="1255" cy="525" r="22" fill="url(#gold)"/>
    <rect x="1031" y="560" width="68" height="10" fill="#9f87d4"/>
    <rect x="1221" y="560" width="68" height="10" fill="#9f87d4"/>
    <text x="997" y="600" fill="#cab7ef" font-size="15" font-family="Arial, sans-serif">Cross-Genre Era</text>
    <text x="1191" y="600" fill="#cab7ef" font-size="15" font-family="Arial, sans-serif">Next Creators</text>
  </g>

  <g>
    <polygon points="800,460 870,520 800,580 730,520" fill="#f1d18a"/>
    <circle cx="800" cy="520" r="34" fill="#fff2c4"/>
    <text x="768" y="526" fill="#4b2f12" font-size="20" font-family="Arial, sans-serif" font-weight="700">TR</text>
    <text x="702" y="620" fill="#f1ddae" font-size="24" font-family="Arial, sans-serif">Interactive Legacy Monument</text>
  </g>

  <g>
    <rect x="670" y="690" width="260" height="80" rx="12" fill="#211539" stroke="#7b61b9"/>
    <text x="695" y="735" fill="#e6d7ff" font-size="24" font-family="Arial, sans-serif">Listening Pods + AR Story Wall</text>
  </g>

  <g opacity="0.75">
    <circle cx="230" cy="200" r="6" fill="#f4c4ff"/>
    <circle cx="520" cy="160" r="5" fill="#f4c4ff"/>
    <circle cx="1030" cy="170" r="7" fill="#f4c4ff"/>
    <circle cx="1350" cy="220" r="6" fill="#f4c4ff"/>
    <circle cx="1460" cy="350" r="4" fill="#f4c4ff"/>
    <circle cx="1120" cy="90" r="3" fill="#f4c4ff"/>
  </g>
</svg>
